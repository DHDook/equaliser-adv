name: Build & Release
on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*.*'
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Install dependencies
        run: |
          brew install librsvg create-dmg
      - name: Determine version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            PRERELEASE="false"
            TAG_NAME="${GITHUB_REF_NAME}"
            DMG_NAME="equaliser-adv-${VERSION}"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            VERSION="0.1-dev-$(date -u '+%Y%m%d').${SHORT_SHA}"
            PRERELEASE="true"
            TAG_NAME="latest-dev-build"
            DMG_NAME="equaliser-adv-dev-${VERSION}"
          else
            VERSION="0.1-$(date -u '+%Y%m%d').${SHORT_SHA}"
            PRERELEASE="true"
            TAG_NAME="latest-build"
            DMG_NAME="equaliser-adv-${VERSION}"
          fi
          echo "version=${VERSION}"       >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}"     >> "$GITHUB_OUTPUT"
          echo "dmg_name=${DMG_NAME}"     >> "$GITHUB_OUTPUT"
          
      - name: Stamp version into Info.plist
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" \
            src/app/Info.plist
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion ${SHORT_SHA}" \
            src/app/Info.plist
      - name: Commit version stamp
        run: |
          git add src/app/Info.plist
          git diff --cached --quiet || git commit -m "ci: stamp version ${{ steps.version.outputs.version }} [skip ci]"
          git push
      - name: Build app bundle
        run: ./bundle.sh
      - name: Create DMG
        run: |
          create-dmg \
            --volname "Equaliser Advanced" \
            --app-drop-link 140 120 \
            --icon "Equaliser Advanced.app" 420 120 \
            --window-size 560 400 \
            --icon-size 80 \
            "release/${{ steps.version.outputs.dmg_name }}.dmg" \
            "release/Equaliser Advanced.app"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag_name }}
          name:       ${{ steps.version.outputs.tag_name }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          make_latest: ${{ steps.version.outputs.prerelease == 'false' }}
          generate_release_notes: true
          files: |
            release/${{ steps.version.outputs.dmg_name }}.dmg
