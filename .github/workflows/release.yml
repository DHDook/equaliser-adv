name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install librsvg create-dmg

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            PRERELEASE="false"
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION="0.0.0-$(date -u '+%Y%m%d').${SHORT_SHA}"
            PRERELEASE="true"
            TAG_NAME="latest-build"
          fi
          echo "version=${VERSION}"       >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}"     >> "$GITHUB_OUTPUT"

      - name: Stamp version into Info.plist
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" \
            src/app/Info.plist
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion ${SHORT_SHA}" \
            src/app/Info.plist

      - name: Build app bundle
        run: ./bundle.sh

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Equaliser" \
            --app-drop-link 140 120 \
            --icon "Equaliser.app" 420 120 \
            --window-size 560 400 \
            --icon-size 80 \
            "release/equaliser-adv-${{ steps.version.outputs.version }}.dmg" \
            "release/Equaliser.app"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag_name }}
          name:       ${{ steps.version.outputs.tag_name }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          make_latest: ${{ steps.version.outputs.prerelease == 'false' }}
          generate_release_notes: true
          files: |
            release/equaliser-adv-${{ steps.version.outputs.version }}.dmg
